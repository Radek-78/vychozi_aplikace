<style>
  :root {
    --lidl-blue: #0050aa;
    --lidl-dark-blue: #002466;
    --lidl-light-blue: #008cd2;
    --lidl-yellow: #fff000;
    --lidl-red: #e60a14;
    --white: #ffffff;
    --black: #000000;
    --page: #f0f4fa;
    --panel: #ffffff;
    --line: #dce5f0;
    --line-soft: #eaeff7;
    --text: #0d1b3e;
    --muted: #5e6e8a;
    --sidebar-width: 220px;
    --radius: 6px;
    --shadow: 0 2px 12px rgba(0, 36, 102, 0.08);
    --font: "Lidl Font Pro", "Lidl Font Cond Pro", "Aptos", "Segoe UI", sans-serif;
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    min-height: 100%;
  }

  body {
    background: var(--page);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
  }

  button,
  input,
  textarea {
    font: inherit;
  }

  button {
    -webkit-tap-highlight-color: transparent;
  }

  .sprite {
    height: 0;
    position: absolute;
    width: 0;
  }

  /* ── Layout ──────────────────────────────────────── */

  .app {
    display: grid;
    grid-template-columns: var(--sidebar-width) minmax(0, 1fr);
    min-height: 100vh;
    transition: grid-template-columns 0.25s ease;
  }

  /* ── Sidebar ─────────────────────────────────────── */

  .sidebar {
    background: var(--lidl-dark-blue);
    color: var(--white);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-x: hidden;
    overflow-y: auto;
  }

  .brand {
    align-items: center;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    display: grid;
    gap: 10px;
    grid-template-columns: 36px minmax(0, 1fr);
    min-height: 58px;
    padding: 10px 11px;
  }

  .brand-logo {
    display: block;
    height: 36px;
    object-fit: contain;
    width: 36px;
  }

  .brand-text {
    min-width: 0;
    overflow: hidden;
    transition: opacity 0.22s ease, max-width 0.28s ease;
  }

  .brand-text strong {
    display: block;
    font-size: 15px;
    font-weight: 700;
    line-height: 1.2;
    white-space: nowrap;
  }

  .brand-text small {
    color: rgba(255, 255, 255, 0.55);
    display: block;
    font-size: 11px;
    margin-top: 2px;
    white-space: nowrap;
  }

  .navigation {
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding: 12px 10px;
    flex: 1;
  }

  .navigation p {
    color: rgba(255, 255, 255, 0.4);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    margin: 12px 6px 4px;
    max-height: 40px;
    overflow: hidden;
    text-transform: uppercase;
    transition: opacity 0.22s ease, max-height 0.28s ease, margin 0.28s ease;
  }

  .nav-link {
    align-items: center;
    background: transparent;
    border: 0;
    border-radius: var(--radius);
    color: rgba(255, 255, 255, 0.72);
    cursor: pointer;
    display: flex;
    font-size: 14px;
    gap: 10px;
    min-height: 40px;
    padding: 9px 10px;
    text-align: left;
    transition: background 0.12s, color 0.12s;
    width: 100%;
  }

  .nav-link:hover {
    background: rgba(255, 255, 255, 0.08);
    color: var(--white);
  }

  .nav-link svg {
    flex-shrink: 0;
    height: 18px;
    width: 18px;
  }

  .nav-link span {
    flex: 1;
    max-width: 160px;
    overflow: hidden;
    transition: opacity 0.22s ease, max-width 0.28s ease;
    white-space: nowrap;
  }

  .nav-link.is-active {
    background: var(--lidl-yellow);
    color: var(--lidl-dark-blue);
    font-weight: 700;
  }

  .nav-link.is-active:hover {
    background: var(--lidl-yellow);
    color: var(--lidl-dark-blue);
  }

  .sidebar-user {
    align-items: center;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    display: flex;
    gap: 10px;
    padding: 14px 16px;
    transition: padding 0.28s ease;
  }

  .sidebar-user > span:not(.avatar) {
    flex: 1;
    min-width: 0;
    overflow: hidden;
    transition: opacity 0.22s ease, max-width 0.28s ease;
  }

  .sidebar-user strong {
    display: block;
    font-size: 13px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .sidebar-user small {
    color: var(--lidl-yellow);
    display: block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    margin-top: 1px;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .avatar {
    align-items: center;
    background: var(--lidl-yellow);
    border-radius: var(--radius);
    color: var(--lidl-dark-blue);
    display: inline-flex;
    font-size: 12px;
    font-weight: 700;
    height: 34px;
    justify-content: center;
    min-width: 34px;
    width: 34px;
    flex-shrink: 0;
  }

  .sidebar-user .avatar {
    font-size: 10px;
    height: 24px;
    min-width: 24px;
    width: 24px;
  }

  /* ── Sidebar toggle ──────────────────────────────── */

  .sidebar-toggle {
    align-items: center;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.14);
    border-radius: 5px;
    color: rgba(255, 255, 255, 0.6);
    cursor: pointer;
    display: flex;
    flex-shrink: 0;
    height: 26px;
    justify-content: center;
    margin: auto 16px 12px;
    transition: background 0.15s, color 0.15s;
    width: 26px;
  }

  .sidebar-toggle:hover {
    background: rgba(255, 255, 255, 0.18);
    color: var(--white);
  }

  .sidebar-toggle svg {
    height: 14px;
    transform: rotate(180deg);
    transition: transform 0.28s ease;
    width: 14px;
  }

  /* ── Sidebar collapsed ───────────────────────────── */

  .app.sidebar-collapsed {
    grid-template-columns: 58px minmax(0, 1fr);
  }

  .app.sidebar-collapsed .brand-text {
    opacity: 0;
    visibility: hidden;
  }

  .app.sidebar-collapsed .navigation p {
    opacity: 0;
    visibility: hidden;
  }

  .app.sidebar-collapsed .nav-link span {
    opacity: 0;
    visibility: hidden;
  }

  .app.sidebar-collapsed .sidebar-user > span:not(.avatar) {
    opacity: 0;
    visibility: hidden;
  }

  .app.sidebar-collapsed .sidebar-toggle svg {
    transform: rotate(0deg);
  }

  /* ── Main ────────────────────────────────────────── */

  .main {
    display: grid;
    grid-template-rows: auto 1fr auto;
    min-width: 0;
  }

  /* ── Topbar ──────────────────────────────────────── */

  .topbar {
    align-items: center;
    background: var(--white);
    border-bottom: 1px solid var(--line);
    display: flex;
    gap: 16px;
    justify-content: space-between;
    min-height: 58px;
    padding: 0 24px;
  }

  .topbar-left,
  .topbar-right {
    align-items: center;
    display: flex;
    gap: 12px;
    min-width: 0;
  }

  .breadcrumbs {
    align-items: center;
    color: var(--muted);
    display: flex;
    font-size: 13px;
    gap: 6px;
  }

  .breadcrumbs svg {
    color: var(--line);
    flex-shrink: 0;
  }

  .breadcrumbs strong {
    color: var(--text);
  }

  .project-chip {
    align-items: center;
    background: var(--page);
    border: 1px solid var(--line-soft);
    border-radius: var(--radius);
    display: flex;
    gap: 6px;
    padding: 5px 10px;
  }

  .project-chip small {
    color: var(--muted);
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .project-chip strong {
    font-size: 13px;
  }

  .user-chip {
    align-items: center;
    background: var(--lidl-blue);
    border-radius: var(--radius);
    color: var(--white);
    display: flex;
    gap: 8px;
    min-height: 38px;
    overflow: hidden;
    padding: 3px 10px 3px 3px;
  }

  .user-chip strong {
    font-size: 13px;
    max-width: 160px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .icon-button {
    align-items: center;
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    color: var(--lidl-blue);
    cursor: pointer;
    display: inline-flex;
    height: 38px;
    justify-content: center;
    transition: background 0.1s;
    width: 38px;
  }

  .icon-button:hover {
    background: var(--page);
  }

  .icon-button svg {
    height: 17px;
    width: 17px;
  }

  .icon-button.danger {
    background: var(--lidl-red);
    border-color: var(--lidl-red);
    color: var(--white);
  }

  /* ── Page ────────────────────────────────────────── */

  .page {
    display: grid;
    gap: 18px;
    padding: 22px 24px;
  }

  .page-header {
    align-items: flex-start;
    display: flex;
    gap: 16px;
    justify-content: space-between;
  }

  .kicker {
    color: var(--lidl-blue);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    margin: 0 0 5px;
    text-transform: uppercase;
  }

  h1,
  h2,
  p {
    margin-top: 0;
  }

  h1 {
    color: var(--lidl-dark-blue);
    font-size: 26px;
    font-weight: 700;
    line-height: 1.15;
    margin-bottom: 6px;
  }

  h2 {
    color: var(--lidl-dark-blue);
    font-size: 16px;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 0;
  }

  .lead {
    color: var(--muted);
    font-size: 13px;
    line-height: 1.55;
    margin: 0;
    max-width: 600px;
  }

  .header-actions,
  .form-actions,
  .modal-actions {
    display: flex;
    flex-shrink: 0;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: flex-end;
    padding-top: 4px;
  }

  /* ── Buttons ─────────────────────────────────────── */

  .button {
    align-items: center;
    border: 1px solid transparent;
    border-radius: var(--radius);
    cursor: pointer;
    display: inline-flex;
    font-size: 13px;
    font-weight: 700;
    gap: 7px;
    justify-content: center;
    min-height: 36px;
    padding: 7px 14px;
    transition: opacity 0.1s;
  }

  .button svg {
    height: 15px;
    width: 15px;
  }

  .button-primary {
    background: var(--lidl-blue);
    color: var(--white);
  }

  .button-primary:hover {
    background: var(--lidl-dark-blue);
  }

  .button-secondary {
    background: var(--white);
    border-color: var(--line);
    color: var(--lidl-dark-blue);
  }

  .button-secondary:hover {
    background: var(--page);
  }

  .button-ghost {
    background: transparent;
    border-color: rgba(255, 255, 255, 0.3);
    color: var(--white);
  }

  .button-ghost:hover {
    background: rgba(255, 255, 255, 0.12);
    border-color: rgba(255, 255, 255, 0.5);
  }

  .button:active,
  .icon-button:active,
  .nav-link:active {
    opacity: 0.8;
    transform: translateY(1px);
  }

  .button:disabled {
    cursor: wait;
    opacity: 0.6;
    transform: none;
  }

  .button:focus-visible,
  .icon-button:focus-visible,
  .nav-link:focus-visible,
  input:focus-visible,
  textarea:focus-visible {
    box-shadow: 0 0 0 3px rgba(255, 240, 0, 0.9), 0 0 0 5px rgba(0, 80, 170, 0.3);
    outline: none;
  }

  /* ── Status strip ────────────────────────────────── */

  /* ── Home hero ───────────────────────────────────── */

  .home-hero {
    align-items: flex-end;
    background-color: var(--lidl-dark-blue);
    background-image:
      radial-gradient(ellipse at 92% -15%, rgba(255, 240, 0, 0.22) 0%, transparent 42%),
      radial-gradient(circle at 110% 110%, rgba(0, 80, 170, 0.6) 0%, transparent 50%),
      radial-gradient(circle, rgba(255, 255, 255, 0.055) 1px, transparent 1px);
    background-size: 100%, 100%, 24px 24px;
    border-radius: var(--radius);
    color: var(--white);
    display: flex;
    justify-content: space-between;
    overflow: hidden;
    padding: 28px 30px 22px;
    position: relative;
  }

  .home-hero::after {
    background: var(--lidl-yellow);
    bottom: 0;
    content: "";
    height: 3px;
    left: 0;
    position: absolute;
    right: 0;
  }

  .home-hero-greeting {
    font-size: 26px;
    font-weight: 700;
    line-height: 1.15;
    margin: 0 0 5px;
  }

  .home-hero-app {
    color: rgba(255, 255, 255, 0.48);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.09em;
    margin: 0;
    text-transform: uppercase;
  }

  .home-hero-date {
    color: rgba(255, 255, 255, 0.5);
    font-size: 13px;
    text-align: right;
    white-space: nowrap;
  }

  /* ── Status strip ─────────────────────────────── */

  .status-strip {
    display: grid;
    gap: 12px;
    grid-template-columns: repeat(4, minmax(0, 1fr));
  }

  .status-card {
    align-items: center;
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: 0 1px 4px rgba(0, 36, 102, 0.04);
    display: flex;
    gap: 14px;
    padding: 16px 18px;
    transition: box-shadow 0.15s ease;
  }

  .status-card:hover {
    box-shadow: 0 3px 12px rgba(0, 36, 102, 0.1);
  }

  .status-icon {
    align-items: center;
    border-radius: 8px;
    display: inline-flex;
    flex-shrink: 0;
    height: 40px;
    justify-content: center;
    width: 40px;
    background: #e6f0fb;
    color: var(--lidl-blue);
  }

  .status-icon svg {
    height: 18px;
    width: 18px;
  }

  .status-card[data-tone="success"] .status-icon {
    background: #e4f5ee;
    color: #007a45;
  }

  .status-card[data-tone="info"] .status-icon {
    background: #fff9cc;
    color: #7a6200;
  }

  .status-card[data-tone="error"] .status-icon {
    background: #fde8e8;
    color: var(--lidl-red);
  }

  .status-card > div {
    min-width: 0;
  }

  .status-card span {
    color: var(--muted);
    display: block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    margin-bottom: 3px;
    text-transform: uppercase;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .status-card strong {
    color: var(--text);
    display: block;
    font-size: 14px;
    font-weight: 700;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ── Panel ───────────────────────────────────────── */

  .panel {
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .panel-header {
    align-items: center;
    border-bottom: 1px solid var(--line-soft);
    display: flex;
    justify-content: space-between;
    padding: 16px 20px;
  }

  /* ── Module grid ─────────────────────────────────── */

  .module-grid {
    display: grid;
    gap: 14px;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    padding: 16px;
  }

  .module-card {
    background: var(--white);
    border: 1px solid var(--line-soft);
    border-radius: var(--radius);
    border-top: 3px solid var(--lidl-blue);
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-height: 160px;
    padding: 18px;
    transition: box-shadow 0.2s ease, transform 0.2s ease;
  }

  .module-card:hover {
    box-shadow: 0 6px 20px rgba(0, 36, 102, 0.1);
    transform: translateY(-2px);
  }

  .module-card[data-accent="yellow"] {
    border-top-color: #d4b800;
  }

  .module-card[data-accent="red"] {
    border-top-color: var(--lidl-red);
  }

  .module-icon {
    align-items: center;
    background: var(--lidl-blue);
    border-radius: 8px;
    color: var(--white);
    display: inline-flex;
    flex-shrink: 0;
    height: 38px;
    justify-content: center;
    width: 38px;
  }

  .module-icon svg {
    height: 18px;
    width: 18px;
  }

  .module-card[data-accent="yellow"] .module-icon {
    background: var(--lidl-yellow);
    color: var(--lidl-dark-blue);
  }

  .module-card[data-accent="red"] .module-icon {
    background: var(--lidl-red);
    color: var(--white);
  }

  .module-card h2 {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 2px;
  }

  .module-card p {
    color: var(--muted);
    font-size: 12px;
    line-height: 1.5;
    margin-bottom: 0;
  }

  .module-card footer {
    align-items: center;
    border-top: 1px solid var(--line-soft);
    display: flex;
    justify-content: space-between;
    margin-top: auto;
    padding-top: 10px;
  }

  tr.is-muted td {
    color: var(--muted);
    opacity: 0.65;
  }

  .pill {
    background: #e5eef9;
    border-radius: 3px;
    color: var(--lidl-blue);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.06em;
    padding: 3px 8px;
    text-transform: uppercase;
  }

  .button-secondary.button-small {
    font-size: 12px;
    min-height: 28px;
    padding: 4px 10px;
  }

  /* ── Panel body ──────────────────────────────────── */

  .panel-body {
    padding: 20px;
  }

  /* ── Hours grid (opening hours in store modal) ───── */

  .hours-grid {
    display: grid;
    gap: 6px;
  }

  .hours-row {
    align-items: center;
    display: grid;
    gap: 8px;
    grid-template-columns: 86px 1fr 12px 1fr;
  }

  .hours-row > span:first-child {
    color: var(--text);
    font-size: 12px;
    font-weight: 600;
  }

  .hours-dash {
    color: var(--muted);
    text-align: center;
  }

  /* ── Sync result ──────────────────────────────────── */

  .sync-result {
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .sync-result-header {
    align-items: center;
    border-bottom: 1px solid var(--line-soft);
    display: flex;
    gap: 10px;
    padding: 14px 18px;
  }

  .sync-result-header strong {
    flex: 1;
  }

  .sync-result-timestamp {
    color: var(--muted);
    font-size: 12px;
  }

  .sync-badge {
    align-items: center;
    border-radius: 50%;
    display: inline-flex;
    flex-shrink: 0;
    font-size: 12px;
    font-weight: 700;
    height: 26px;
    justify-content: center;
    width: 26px;
  }

  .sync-badge.is-success { background: #e4f5ee; color: #007a45; }
  .sync-badge.is-error   { background: #fde8e8; color: var(--lidl-red); }

  .sync-result-body {
    padding: 14px 18px;
    display: grid;
    gap: 12px;
  }

  .sync-result-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .sync-result-row > span {
    color: var(--muted);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .sync-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .pill.is-green  { background: #e4f5ee; color: #007a45; }
  .pill.is-orange { background: #fff3e0; color: #b45309; }
  .pill.is-red    { background: #fde8e8; color: var(--lidl-red); }
  .pill.is-blue   { background: #dbeafe; color: #1d4ed8; }

  .sync-errors {
    border-top: 1px solid var(--line-soft);
    color: var(--lidl-red);
    font-size: 12px;
    margin-top: 4px;
    padding-top: 10px;
  }

  /* ── Content grid ────────────────────────────────── */

  .content-grid {
    display: grid;
    gap: 18px;
    grid-template-columns: minmax(400px, 1.1fr) minmax(320px, 0.9fr);
  }

  /* ── Table ───────────────────────────────────────── */

  .table-wrap {
    overflow-x: auto;
  }

  table {
    border-collapse: collapse;
    min-width: 480px;
    width: 100%;
  }

  th,
  td {
    border-bottom: 1px solid var(--line-soft);
    padding: 11px 16px;
    text-align: left;
  }

  th {
    background: #f6f9fd;
    color: var(--lidl-blue);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  td {
    color: var(--text);
    font-size: 13px;
  }

  td:first-child {
    color: var(--muted);
    font-weight: 700;
    white-space: nowrap;
  }

  td:last-child {
    color: var(--muted);
  }

  /* ── Form ────────────────────────────────────────── */

  .form {
    display: grid;
    gap: 14px;
    padding: 16px 20px 20px;
  }

  label {
    color: var(--muted);
    display: grid;
    font-size: 11px;
    font-weight: 700;
    gap: 6px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  input::placeholder,
  textarea::placeholder {
    color: #c8cdd6;
  }

  input.is-invalid {
    border-color: var(--lidl-red);
    animation: shake 0.35s ease;
  }

  .field-error {
    color: var(--lidl-red);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0;
    margin-top: -2px;
    text-transform: none;
  }

  @keyframes shake {
    0%   { transform: translateX(0); }
    20%  { transform: translateX(-6px); }
    40%  { transform: translateX(6px); }
    60%  { transform: translateX(-4px); }
    80%  { transform: translateX(4px); }
    100% { transform: translateX(0); }
  }

  .form-hint {
    color: var(--muted);
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0;
    margin-top: -2px;
    text-transform: none;
  }

  input,
  textarea {
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 14px;
    min-height: 38px;
    padding: 9px 12px;
    resize: vertical;
    transition: border-color 0.15s;
  }

  input:focus,
  textarea:focus {
    border-color: var(--lidl-blue);
    outline: none;
  }

  /* ── Status bar ──────────────────────────────────── */

  .statusbar {
    align-items: center;
    background: var(--white);
    border-top: 1px solid var(--line);
    color: var(--muted);
    display: flex;
    font-size: 11px;
    justify-content: space-between;
    min-height: 28px;
    padding: 0 24px;
  }

  .statusbar a {
    color: var(--lidl-blue);
    font-weight: 700;
    text-decoration: none;
  }

  /* ── Loader ──────────────────────────────────────── */

  .loader {
    align-items: center;
    background: var(--lidl-blue);
    background-image: radial-gradient(circle, rgba(255, 255, 255, 0.08) 1px, transparent 1px);
    background-size: 24px 24px;
    color: var(--white);
    display: none;
    inset: 0;
    justify-content: center;
    position: fixed;
    z-index: 50;
  }

  .loader.is-visible {
    display: flex;
  }

  .loader-inner {
    align-items: center;
    display: grid;
    justify-items: center;
    text-align: center;
  }

  .loader-inner img {
    background: var(--white);
    border: 2px solid rgba(255, 255, 255, 0.6);
    height: 110px;
    margin-bottom: 28px;
    object-fit: contain;
    padding: 6px;
    width: 110px;
  }

  .loader-inner strong {
    font-size: 30px;
    font-weight: 700;
    letter-spacing: 0.12em;
    line-height: 1;
    text-transform: uppercase;
  }

  .loader-inner span {
    color: rgba(255, 255, 255, 0.7);
    display: block;
    font-size: 14px;
    letter-spacing: 0.22em;
    margin-top: 8px;
  }

  .loader-inner p {
    color: rgba(255, 255, 255, 0.6);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    margin: 44px 0 14px;
    text-transform: uppercase;
  }

  .loader-dots {
    display: flex;
    gap: 10px;
  }

  .loader-dots i {
    animation: dot 0.9s ease-in-out infinite;
    background: var(--lidl-yellow);
    border-radius: 50%;
    display: block;
    height: 10px;
    width: 10px;
  }

  .loader-dots i:nth-child(2) {
    animation-delay: 0.15s;
  }

  .loader-dots i:nth-child(3) {
    animation-delay: 0.3s;
  }

  /* ── Toast ───────────────────────────────────────── */

  .toast-region {
    bottom: 20px;
    display: grid;
    gap: 8px;
    max-width: min(400px, calc(100vw - 32px));
    position: fixed;
    right: 20px;
    z-index: 60;
  }

  .toast {
    animation: toastIn 0.18s ease-out both;
    background: var(--white);
    border: 1px solid var(--line);
    border-left: 4px solid var(--lidl-blue);
    border-radius: var(--radius);
    box-shadow: 0 8px 28px rgba(0, 36, 102, 0.16);
    color: var(--text);
    font-size: 13px;
    padding: 12px 16px;
  }

  .toast.is-error {
    border-left-color: var(--lidl-red);
  }

  /* ── Modal ───────────────────────────────────────── */

  /* ── Modal ───────────────────────────────────────── */

  .modal {
    background: var(--white);
    border: none;
    border-radius: var(--radius);
    border-top: 4px solid var(--lidl-blue);
    box-shadow: 0 24px 80px rgba(0, 20, 80, 0.28), 0 4px 16px rgba(0, 20, 80, 0.12);
    max-width: min(480px, calc(100vw - 32px));
    overflow: hidden;
    padding: 0;
    width: 100%;
  }

  .modal.modal-wide {
    max-width: min(680px, calc(100vw - 32px));
  }

  .modal::backdrop {
    background: rgba(0, 24, 70, 0.5);
    backdrop-filter: blur(3px);
  }

  .modal form {
    padding: 0;
  }

  .modal-header {
    align-items: center;
    background-color: var(--lidl-dark-blue);
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 15px, rgba(255, 255, 255, 0.035) 15px, rgba(255, 255, 255, 0.035) 16px),
      repeating-linear-gradient(90deg, transparent, transparent 15px, rgba(255, 255, 255, 0.035) 15px, rgba(255, 255, 255, 0.035) 16px);
    display: flex;
    gap: 14px;
    overflow: hidden;
    padding: 13px 18px;
    position: relative;
  }

  .modal-header::before {
    background:
      radial-gradient(circle at 105% 120%, rgba(255, 240, 0, 0.18) 0%, transparent 45%),
      radial-gradient(circle at 92% -20%, rgba(255, 255, 255, 0.06) 0%, transparent 40%);
    content: "";
    inset: 0;
    pointer-events: none;
    position: absolute;
  }

  .modal-icon {
    align-items: center;
    background: var(--lidl-yellow);
    border-radius: var(--radius);
    color: var(--lidl-dark-blue);
    display: inline-flex;
    flex-shrink: 0;
    height: 38px;
    justify-content: center;
    position: relative;
    width: 38px;
    z-index: 1;
  }

  .modal-icon svg {
    height: 18px;
    width: 18px;
  }

  .modal-header-text {
    flex: 1;
    min-width: 0;
    position: relative;
    z-index: 1;
  }

  .modal-header .kicker {
    color: rgba(255, 255, 255, 0.6);
    margin-bottom: 2px;
  }

  .modal-header h2 {
    color: var(--white);
    font-size: 16px;
    margin-bottom: 0;
  }

  .modal-close {
    align-items: center;
    background: transparent;
    border: none;
    border-radius: var(--radius);
    color: rgba(255, 255, 255, 0.55);
    cursor: pointer;
    display: inline-flex;
    flex-shrink: 0;
    height: 30px;
    justify-content: center;
    margin-left: auto;
    position: relative;
    transition: background 0.12s, color 0.12s;
    width: 30px;
    z-index: 1;
  }

  .modal-close:hover {
    background: rgba(255, 255, 255, 0.12);
    color: var(--white);
  }

  .modal-close svg {
    height: 15px;
    width: 15px;
  }

  .modal-body {
    border-top: 1px solid var(--line-soft);
    color: var(--muted);
    font-size: 14px;
    line-height: 1.7;
    padding: 20px 22px 22px;
  }

  .modal-actions {
    align-items: center;
    background: #f5f8fc;
    border-top: 1px solid var(--line-soft);
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    padding: 14px 22px;
  }

  /* ── Spinner panel ────────────────────────────────── */

  .spinner-demos {
    background: var(--line-soft);
    border-top: 1px solid var(--line-soft);
    display: grid;
    gap: 1px;
    grid-template-columns: repeat(4, minmax(0, 1fr));
  }

  .spinner-tile {
    align-items: center;
    background: var(--white);
    border: none;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 20px;
    justify-content: center;
    min-height: 160px;
    padding: 28px 16px;
    transition: background 0.15s;
  }

  .spinner-tile:hover {
    background: #f5f9ff;
  }

  .spinner-tile.is-active {
    background: #eaf2ff;
    outline: 2px solid var(--lidl-blue);
    outline-offset: -2px;
  }

  .sp-stage {
    align-items: center;
    display: flex;
    height: 64px;
    justify-content: center;
    width: 100%;
  }

  .sp-info {
    display: flex;
    flex-direction: column;
    gap: 3px;
    text-align: center;
  }

  .sp-info strong {
    color: var(--lidl-dark-blue);
    font-size: 12px;
    font-weight: 700;
  }

  .sp-info span {
    color: var(--muted);
    font-size: 11px;
  }

  .sp-logo {
    height: 26px;
    object-fit: contain;
    width: 26px;
  }

  .sp-logo-sm {
    height: 22px;
    margin-bottom: 4px;
    width: 22px;
  }

  /* ── A: Kroužek (SVG arc) ────────────────── */

  .sp-ring {
    align-items: center;
    display: flex;
    height: 56px;
    justify-content: center;
    position: relative;
    width: 56px;
  }

  .sp-ring-svg {
    animation: sp-ring-rotate 1.4s linear infinite;
    height: 56px;
    left: 0;
    position: absolute;
    top: 0;
    width: 56px;
  }

  .sp-ring-track {
    fill: none;
    stroke: rgba(0, 80, 170, 0.12);
    stroke-width: 3;
  }

  .sp-ring-arc {
    animation: sp-ring-dash 1.4s ease-in-out infinite;
    fill: none;
    stroke: var(--lidl-blue);
    stroke-dasharray: 119.4;
    stroke-dashoffset: 100;
    stroke-linecap: round;
    stroke-width: 3;
  }

  .sp-ring-logo {
    position: relative;
    z-index: 1;
  }

  /* ── B: Tečky (squish bounce) ────────────── */

  .sp-trio-wrap {
    align-items: center;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .sp-trio {
    display: flex;
    gap: 7px;
  }

  .sp-trio i {
    animation: sp-squish 1.1s ease-in-out infinite;
    border-radius: 50%;
    display: block;
    height: 11px;
    width: 11px;
  }

  .sp-trio i:nth-child(1) { animation-delay: 0s;    background: var(--lidl-blue); }
  .sp-trio i:nth-child(2) { animation-delay: 0.18s; background: var(--lidl-yellow); box-shadow: 0 0 0 1px rgba(0,0,0,0.06); }
  .sp-trio i:nth-child(3) { animation-delay: 0.36s; background: var(--lidl-red); }

  /* ── C: Lišta (comets) ───────────────────── */

  .sp-bar-wrap {
    align-items: center;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .sp-bar-track {
    background: rgba(0, 80, 170, 0.07);
    border-radius: 2px;
    height: 4px;
    overflow: hidden;
    position: relative;
    width: 90px;
  }

  .sp-comet {
    border-radius: 2px;
    height: 100%;
    left: 0;
    position: absolute;
    top: 0;
    width: 30px;
  }

  .c1 {
    animation: sp-comet 2.2s cubic-bezier(0.38, 0, 0.22, 1) 0s infinite;
    background: linear-gradient(to right, transparent, var(--lidl-blue));
  }

  .c2 {
    animation: sp-comet 1.8s cubic-bezier(0.55, 0, 0.45, 1) -0.7s infinite;
    background: linear-gradient(to right, transparent, #d4b800, #d4b800);
  }

  .c3 {
    animation: sp-comet 2.8s cubic-bezier(0.25, 0, 0.15, 1) -1.5s infinite;
    background: linear-gradient(to right, transparent, var(--lidl-red));
  }

  /* ── D: Vlny (wave equalizer) ────────────── */

  .sp-wave-wrap {
    align-items: center;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .sp-wave {
    align-items: flex-end;
    display: flex;
    gap: 3px;
    height: 28px;
  }

  .sp-wave i {
    animation: sp-wave-bar 1s ease-in-out infinite;
    border-radius: 2px;
    display: block;
    height: 100%;
    transform-origin: bottom;
    width: 5px;
  }

  .sp-wave i:nth-child(1) { animation-delay: 0s;    background: var(--lidl-blue); }
  .sp-wave i:nth-child(2) { animation-delay: 0.14s; background: var(--lidl-blue); }
  .sp-wave i:nth-child(3) { animation-delay: 0.28s; background: var(--lidl-yellow); }
  .sp-wave i:nth-child(4) { animation-delay: 0.42s; background: var(--lidl-red); }
  .sp-wave i:nth-child(5) { animation-delay: 0.56s; background: var(--lidl-red); }

  /* ── Spinner keyframes ───────────────────── */

  @keyframes sp-ring-rotate {
    100% { transform: rotate(360deg); }
  }

  @keyframes sp-ring-dash {
    0%   { stroke-dashoffset: 107; }
    50%  { stroke-dashoffset: 18; }
    100% { stroke-dashoffset: 107; }
  }

  @keyframes sp-squish {
    0%, 100% { opacity: 0.45; transform: translateY(0) scaleX(1) scaleY(1); }
    25%      { opacity: 1;    transform: translateY(-9px) scaleX(0.88) scaleY(1.12); }
    50%      { opacity: 1;    transform: translateY(1px) scaleX(1.28) scaleY(0.72); }
    65%      { opacity: 0.9;  transform: translateY(-2px) scaleX(0.96) scaleY(1.04); }
    80%      { opacity: 0.7;  transform: translateY(0) scaleX(1) scaleY(1); }
  }

  @keyframes sp-comet {
    0%   { transform: translateX(-200%); }
    100% { transform: translateX(700%); }
  }

  @keyframes sp-wave-bar {
    0%, 100% { transform: scaleY(0.18); opacity: 0.55; }
    50%      { transform: scaleY(1);    opacity: 1; }
  }

  /* ── Animations ──────────────────────────────────── */

  @keyframes dot {
    0%, 100% { opacity: 0.35; transform: translateY(0); }
    50% { opacity: 1; transform: translateY(-6px); }
  }

  @keyframes toastIn {
    from { opacity: 0; transform: translateX(10px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  /* ── Modal animations ───────────────────────────── */

  @keyframes modal-enter {
    from { opacity: 0; transform: scale(0.86) translateY(18px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  @keyframes modal-leave {
    from { opacity: 1; transform: scale(1) translateY(0); }
    to   { opacity: 0; transform: scale(0.93) translateY(10px); }
  }

  @keyframes backdrop-enter {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  @keyframes backdrop-leave {
    from { opacity: 1; }
    to   { opacity: 0; }
  }

  dialog[open] {
    animation: modal-enter 0.32s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  dialog[open].is-closing {
    animation: modal-leave 0.22s ease-in both;
  }

  dialog[open]::backdrop {
    animation: backdrop-enter 0.3s ease both;
  }

  dialog[open].is-closing::backdrop {
    animation: backdrop-leave 0.22s ease both;
  }

  /* ── Responsive ──────────────────────────────────── */

  @media (max-width: 1200px) {
    .module-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }

  @media (max-width: 1080px) {
    .status-strip {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .content-grid {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 820px) {
    .app {
      grid-template-columns: 1fr;
    }

    .sidebar {
      min-height: auto;
      height: auto;
      position: static;
    }

    .navigation {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .navigation p {
      grid-column: 1 / -1;
    }

    .topbar {
      flex-wrap: wrap;
      gap: 10px;
      min-height: auto;
      padding: 12px 16px;
    }

    .page {
      padding: 16px;
    }
  }

  /* ── Gate (wizard + bez přístupu) ────────────────── */

  .gate {
    align-items: center;
    background-color: var(--lidl-blue);
    background-image: radial-gradient(circle, rgba(255,255,255,0.12) 1px, transparent 1px);
    background-size: 28px 28px;
    display: flex;
    justify-content: center;
    min-height: 100vh;
    padding: 48px 24px;
  }

  .gate-card {
    background: var(--panel);
    border-radius: var(--radius);
    box-shadow: 0 24px 80px rgba(0, 20, 80, 0.28), 0 4px 16px rgba(0, 20, 80, 0.12);
    max-width: 560px;
    overflow: hidden;
    width: 100%;
  }

  .gate-header {
    align-items: center;
    background-color: var(--lidl-dark-blue);
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 15px, rgba(255, 255, 255, 0.035) 15px, rgba(255, 255, 255, 0.035) 16px),
      repeating-linear-gradient(90deg, transparent, transparent 15px, rgba(255, 255, 255, 0.035) 15px, rgba(255, 255, 255, 0.035) 16px);
    display: flex;
    gap: 14px;
    overflow: hidden;
    padding: 16px 22px;
    position: relative;
  }

  .gate-header::before {
    background:
      radial-gradient(circle at 105% 120%, rgba(255, 240, 0, 0.18) 0%, transparent 45%),
      radial-gradient(circle at 92% -20%, rgba(255, 255, 255, 0.06) 0%, transparent 40%);
    content: "";
    inset: 0;
    pointer-events: none;
    position: absolute;
  }

  .gate-header img {
    background: var(--white);
    border-radius: var(--radius);
    flex-shrink: 0;
    height: 44px;
    object-fit: contain;
    padding: 4px;
    position: relative;
    width: 44px;
    z-index: 1;
  }

  .gate-header-text {
    min-width: 0;
    position: relative;
    z-index: 1;
  }

  .gate-header .kicker {
    color: rgba(255, 255, 255, 0.6);
    margin-bottom: 2px;
  }

  .gate-header h1 {
    color: var(--white);
    font-size: 18px;
    margin: 0;
  }

  .gate-body {
    display: grid;
    gap: 14px;
    padding: 20px 22px;
  }

  .gate-body.wizard-body {
    padding: 0;
  }

  .gate-actions {
    align-items: center;
    background: #f5f8fc;
    border-top: 1px solid var(--line-soft);
    display: flex;
    gap: 10px;
    padding: 14px 22px;
  }

  .gate-actions #wizNext {
    margin-left: auto;
  }

  .gate-actions .is-hidden {
    visibility: hidden;
  }

  .gate-note {
    color: var(--muted);
    font-size: 12px;
    line-height: 1.55;
    margin: 0;
  }

  .gate-warning {
    background: #fde8e8;
    border-left: 4px solid var(--lidl-red);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 13px;
    line-height: 1.5;
    padding: 10px 14px;
  }

  .info-row {
    align-items: center;
    border: 1px solid var(--line-soft);
    border-radius: var(--radius);
    display: flex;
    gap: 14px;
    padding: 10px 14px;
  }

  .info-row > div {
    min-width: 0;
  }

  .info-row > div > span {
    color: var(--muted);
    display: block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    margin-bottom: 2px;
    text-transform: uppercase;
  }

  .info-row strong {
    display: block;
    font-size: 13px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ── Wizard ──────────────────────────────────────── */

  @keyframes wizSlideForward {
    from { opacity: 0; transform: translateX(20px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  @keyframes wizSlideBack {
    from { opacity: 0; transform: translateX(-20px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .wizard-steps {
    border-bottom: 1px solid var(--line-soft);
    display: flex;
    gap: 0;
    list-style: none;
    margin: 0;
    padding: 14px 22px;
    transition: opacity 0.2s ease;
  }

  .gate-card[data-state="progress"] .wizard-steps,
  .gate-card[data-state="success"] .wizard-steps {
    opacity: 0;
    pointer-events: none;
  }

  .wizard-steps li {
    align-items: center;
    color: var(--muted);
    display: flex;
    flex: 1;
    flex-direction: column;
    font-size: 10px;
    font-weight: 700;
    gap: 5px;
    letter-spacing: 0.04em;
    list-style: none;
    position: relative;
    text-align: center;
    text-transform: uppercase;
  }

  .wizard-steps li + li::before {
    background: var(--line-soft);
    content: "";
    height: 1px;
    left: calc(-50% + 13px);
    position: absolute;
    right: calc(50% + 13px);
    top: 12px;
    transition: background 0.3s ease;
  }

  .wizard-steps li.is-done + li::before {
    background: var(--lidl-blue);
  }

  .wizard-steps i {
    align-items: center;
    background: var(--line-soft);
    border-radius: 50%;
    color: var(--muted);
    display: inline-flex;
    flex-shrink: 0;
    font-size: 11px;
    font-style: normal;
    height: 24px;
    justify-content: center;
    position: relative;
    transition: background 0.2s ease, color 0.2s ease;
    width: 24px;
    z-index: 1;
  }

  .wizard-steps li.is-active {
    color: var(--lidl-dark-blue);
  }

  .wizard-steps li.is-active i {
    background: var(--lidl-yellow);
    color: var(--lidl-dark-blue);
  }
